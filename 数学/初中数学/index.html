<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>立方和终极几何证明</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; }
        .controls { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold;
            background: #ff9800; color: #fff; border: none; border-radius: 8px;
            pointer-events: auto; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        button:hover { background: #e68a00; transform: scale(1.05); }
        h2 { margin: 0 0 10px 0; color: #ffeb3b; }
        p { margin: 5px 0; font-size: 16px; }
        .highlight { color: #00bcd4; font-weight: bold; }
        .tip { position: absolute; top: 20px; right: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>立方和公式: $a^3 + b^3 = (a+b)(a^2 - ab + b^2)$</h2>
        <p>设定: $a=3$ (蓝色系), $b=1$ (红色系)</p>
        <p>当前状态: <span id="status" class="highlight">原始立方体 $a^3$ 和 $b^3$</span></p>
    </div>
    <div class="tip">💡 提示：按住鼠标左键可拖拽旋转视角，滚轮缩放</div>
    <div class="controls">
        <button onclick="toggleTransform()" id="actionBtn">播放完美拼合动画</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        let scene, camera, renderer, controls;
        let b1, b2, b3, b4; // 4个积木块
        let isTransformed = false;

        init();
        animate();

        function createBlock(w, h, d, color) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshPhongMaterial({ 
                color: color, transparent: true, opacity: 0.85, shininess: 100 
            });
            const mesh = new THREE.Mesh(geometry, material);
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
            mesh.add(line);
            scene.add(mesh);
            return mesh;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 6, 14); // 调整初始视角，方便看清整体

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x1a1a1a);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 15);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x555555));

            // 网格辅助线，帮助看清底面积
            const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
            grid.position.y = 0;
            scene.add(grid);

            // ==========================================
            // 严谨切割：将 a^3(3x3x3) 完美切成3块，加上 b^3(1x1x1)
            // ==========================================
            b1 = createBlock(3, 3, 2, 0x1565c0); // 块1 (深蓝)
            b2 = createBlock(3, 2, 1, 0x1e88e5); // 块2 (中蓝)
            b3 = createBlock(3, 1, 1, 0x64b5f6); // 块3 (浅蓝)
            b4 = createBlock(1, 1, 1, 0xe53935); // 块4 (红色, b^3)

            resetToCubes(0); // 初始放置在 a^3 和 b^3 的位置
        }

        // 状态1：变回分离的立方体
        function resetToCubes(duration = 1.5) {
            // b1, b2, b3 组成位于左侧的 a^3 (完美吻合的三层拼图)
            gsap.to(b1.position, {x: -1.5, y: 1.5, z: 1, duration: duration, ease: "power2.inOut"});
            gsap.to(b1.rotation, {x: 0, y: 0, z: 0, duration: duration});

            gsap.to(b2.position, {x: -1.5, y: 1, z: 2.5, duration: duration, ease: "power2.inOut"});
            gsap.to(b2.rotation, {x: 0, y: 0, z: 0, duration: duration});

            gsap.to(b3.position, {x: -1.5, y: 2.5, z: 2.5, duration: duration, ease: "power2.inOut"});
            gsap.to(b3.rotation, {x: 0, y: 0, z: 0, duration: duration});

            // b4 (红块 b^3) 放置在右侧
            gsap.to(b4.position, {x: 2.5, y: 0.5, z: 0.5, duration: duration, ease: "power2.inOut"});
            gsap.to(b4.rotation, {x: 0, y: 0, z: 0, duration: duration});
        }

        // 状态2：拼成统一高度为 (a+b) 的塔
        function transformToFormula() {
            // 高塔1：b2 旋转 90 度叠在 b1 顶部。总高度 = 3 + 1 = 4 (即 a+b)
            gsap.to(b1.position, {x: -0.5, y: 1.5, z: 0, duration: 1.5, ease: "power2.inOut"});
            gsap.to(b1.rotation, {x: 0, y: 0, z: 0, duration: 1.5});

            gsap.to(b2.position, {x: -0.5, y: 3.5, z: 0, duration: 1.5, ease: "power2.inOut"});
            gsap.to(b2.rotation, {x: -Math.PI/2, y: 0, z: 0, duration: 1.5}); 

            // 高塔2：b4 叠在旋转后的 b3 顶部。总高度 = 3 + 1 = 4 (即 a+b)
            gsap.to(b3.position, {x: 1.5, y: 1.5, z: -0.5, duration: 1.5, ease: "power2.inOut"});
            gsap.to(b3.rotation, {x: 0, y: 0, z: Math.PI/2, duration: 1.5});

            gsap.to(b4.position, {x: 1.5, y: 3.5, z: -0.5, duration: 1.5, ease: "power2.inOut"});
            gsap.to(b4.rotation, {x: 0, y: 0, z: 0, duration: 1.5});
        }

        function toggleTransform() {
            isTransformed = !isTransformed;
            const btn = document.getElementById('actionBtn');
            const status = document.getElementById('status');

            if (isTransformed) {
                btn.innerText = "还原回立方体";
                status.innerHTML = "提取公因式：高度统一为 $(a+b)$ 的高塔！<br>看地面网格：底面积恰好是 $(a^2 - ab + b^2)$";
                transformToFormula();
            } else {
                btn.innerText = "播放完美拼合动画";
                status.innerText = "原始立方体 $a^3$ 和 $b^3$";
                resetToCubes();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 允许鼠标平滑拖拽
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
